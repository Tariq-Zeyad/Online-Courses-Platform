<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Enroll in premium online courses by Eng. Tariq Zeyad. Start your learning journey today.">
  <title>Enroll | NovaLearn by Eng. Tariq Zeyad</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="container">
      <div class="top-bar-left">
        <span><i class="fas fa-phone"></i> +970 59 123 4567</span>
        <span><i class="fas fa-envelope"></i> tariq.zeyad@novalearn.com</span>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="page-header" id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <div class="logo-text">
          <span class="logo-name">Nova<span class="highlight">Learn</span></span>
          <span class="logo-tagline">by Eng. Tariq Zeyad</span>
        </div>
      </a>
      <nav class="main-nav" id="mainNav">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="courses.html" class="nav-link">Courses</a></li>
          <li><a href="about.html" class="nav-link">About Me</a></li>
          <li><a href="blog.html" class="nav-link">Blog</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
          <li><a href="faq.html" class="nav-link">FAQ</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="btn-icon" id="themeToggle"><i class="fas fa-sun"></i></button>
        <a href="enroll.html" class="btn btn-primary">Enroll Now</a>
        <button class="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </header>

  <main>
    <!-- ENROLL FORM -->
    <section class="enroll-section">
      <div class="container">
        <div class="enroll-wrapper">
          <h2><i class="fas fa-clipboard-list"></i> Enroll in a Course</h2>
          <form id="enrollForm" novalidate>
            <div class="form-grid">
              <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" placeholder="e.g., Eng. Tariq Zeyad" required>
                <div class="error-message" id="nameError"></div>
              </div>
              <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" placeholder="tariq@example.com" required>
                <div class="error-message" id="emailError"></div>
              </div>
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="+970 59...">
              </div>
              <div class="form-group">
                <label for="course">Select Course *</label>
                <select id="course" required>
                  <option value="">-- Choose a Course --</option>
                  <option value="1">Full Stack Web Development Bootcamp</option>
                  <option value="2">UI/UX Design Masterclass</option>
                  <option value="3">Mobile App Development with Flutter</option>
                  <option value="4">Python for Data Science & AI</option>
                  <option value="5">Cloud Computing with AWS</option>
                  <option value="6">Digital Marketing Mastery</option>
                </select>
                <div class="error-message" id="courseError"></div>
              </div>
              <div class="form-group full-width">
                <label for="message">Message (Optional)</label>
                <textarea id="message" rows="4" placeholder="Tell me about your learning goals..."></textarea>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:1.5rem;">
              <i class="fas fa-paper-plane"></i> Complete Enrollment
            </button>
          </form>
          <div id="successMessage" class="success-message hidden">
            <i class="fas fa-check-circle"></i> Thank you for enrolling! Check your email for confirmation. - Eng. Tariq Zeyad
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="main-footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;"><p>&copy; 2025 NovaLearn | <strong>Eng. Tariq Zeyad</strong></p></div>
    </div>
  </footer>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-container">
      <input type="text" placeholder="Search..." class="search-input">
      <button class="search-close"><i class="fas fa-times"></i></button>
    </div>
  </div>
  
  <button class="back-to-top" id="backToTop"><i class="fas fa-chevron-up"></i></button>
  <script src="js/main.js"></script>
</body>
</html>
